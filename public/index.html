
● <!DOCTYPE html>
  <html lang="pl">
  <head>
    <meta charset="UTF-8">
    <title>World Clock</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Segoe UI', sans-serif;
        background: #0f0f1a;
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 48px;
      }
      h1 { font-size: 14px; letter-spacing: 4px; color: #666; text-transform: uppercase; }

      .clock-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .clock {
        width: 200px; height: 200px;
        border-radius: 50%;
        border: 3px solid #333;
        background: #1a1a2e;
        position: relative;
        cursor: pointer;
        transition: border-color 0.3s;
      }
      .clock:hover { border-color: #4f8ef7; }
      .hand {
        position: absolute;
        bottom: 50%; left: 50%;
        transform-origin: bottom center;
        border-radius: 4px;
      }
      .hour   { width: 4px; height: 55px; background: white;  margin-left: -2px; }
      .minute { width: 2px; height: 75px; background: #4f8ef7; margin-left: -1px; }
      .second { width: 1px; height: 80px; background: #f74f4f; margin-left: -0.5px; }
      .dot {
        width: 10px; height: 10px; background: white;
        border-radius: 50%; position: absolute;
        top: 50%; left: 50%; transform: translate(-50%, -50%);
      }
      .city-name {
        font-size: 28px; font-weight: 700; letter-spacing: -1px;
      }
      .digital {
        font-size: 18px; color: #4f8ef7;
        font-variant-numeric: tabular-nums;
      }
      .btn {
        padding: 10px 28px; border-radius: 24px;
        border: 1px solid #333; background: transparent;
        color: #aaa; cursor: pointer; font-size: 13px;
        transition: all 0.2s;
      }
      .btn:hover { border-color: #4f8ef7; color: white; }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        width: 640px;
      }
      .tile {
        background: #1a1a2e;
        border: 1px solid #222;
        border-radius: 12px;
        padding: 14px;
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .tile:hover, .tile.active { border-color: #4f8ef7; }
      .tile-city { font-size: 12px; color: #666; margin-bottom: 4px; }
      .tile-time { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
  
  <h1>World Clock</h1>

  <div class="clock-wrap">
    <div class="clock" onclick="nextCity()">
      <div class="hand hour"   id="h"></div>
      <div class="hand minute" id="m"></div>
      <div class="hand second" id="s"></div>
      <div class="dot"></div>   
    </div>
    <div class="city-name" id="cityName">Warszawa</div>
    <div class="digital"   id="digitalTime">00:00:00</div>
    <button class="btn" onclick="nextCity()">Następne miasto →</button>
  </div>
  
  <div class="grid" id="grid"></div>
  
  <script>
    const cities = [
      { name: 'Warszawa',    tz: 'Europe/Warsaw'     },
      { name: 'Londyn',      tz: 'Europe/London'     },
      { name: 'Nowy Jork',   tz: 'America/New_York'  },
      { name: 'Los Angeles', tz: 'America/Los_Angeles'},
      { name: 'Moskwa',      tz: 'Europe/Moscow'     },
      { name: 'Tokio',       tz: 'Asia/Tokyo'        },
      { name: 'Pekin',       tz: 'Asia/Shanghai'     },
      { name: 'Sydney',      tz: 'Australia/Sydney'  },
    ];

    let current = 0;  

    function getTime(tz) {
      const now = new Date();
      const str = now.toLocaleTimeString('pl-PL', { timeZone: tz, hour12: false });
      const [h, m, s] = str.split(':').map(Number);
      return { h, m, s };
    }

    function rotate(el, deg) {
      el.style.transform = `translateX(-50%) rotate(${deg}deg)`;
    }
  
    function updateClock() {
      const { h, m, s } = getTime(cities[current].tz);
      rotate(document.getElementById('h'), (h % 12) * 30 + m * 0.5);
      rotate(document.getElementById('m'), m * 6 + s * 0.1);
      rotate(document.getElementById('s'), s * 6);

      const pad = n => String(n).padStart(2, '0');
      document.getElementById('digitalTime').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
    }

    function nextCity() {
      current = (current + 1) % cities.length;
      document.getElementById('cityName').textContent = cities[current].name;
      document.querySelectorAll('.tile').forEach((t, i) =>
        t.classList.toggle('active', i === current));
      updateClock();
    }

    function buildGrid() {
      const grid = document.getElementById('grid');
      cities.forEach((city, i) => {
        const div = document.createElement('div');
        div.className = 'tile' + (i === 0 ? ' active' : '');
        div.innerHTML = `<div class="tile-city">${city.name}</div>
                         <div class="tile-time" id="tile-${i}">--:--</div>`;
        div.onclick = () => {
          current = i;
          document.getElementById('cityName').textContent = city.name;
          document.querySelectorAll('.tile').forEach((t, j) =>
            t.classList.toggle('active', j === i));
          updateClock(); 
        };
        grid.appendChild(div);
      });
    }
  
    function updateTiles() {
      cities.forEach((city, i) => {
        const { h, m } = getTime(city.tz);
        const pad = n => String(n).padStart(2, '0');
        const el = document.getElementById('tile-' + i);
        if (el) el.textContent = `${pad(h)}:${pad(m)}`;
      });
    }
  
    buildGrid();
    updateClock();
    updateTiles();
    setInterval(() => { updateClock(); updateTiles(); }, 1000);
  </script>
  <style>
    .wa-btn {
      position: fixed; bottom: 28px; right: 28px;
      width: 60px; height: 60px; border-radius: 50%;
      background: #25D366; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(37,211,102,0.4);
      transition: transform 0.2s;
    }
    .wa-btn:hover { transform: scale(1.1); }
    .wa-btn svg { width: 32px; height: 32px; fill: white; }
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #1a1a2e; border: 1px solid #333; border-radius: 16px;
      padding: 32px; width: 320px; display: flex; flex-direction: column; gap: 16px;
    }
    .modal h2 { font-size: 18px; }
    .modal p { font-size: 13px; color: #888; }
    .modal input {
      padding: 12px 16px; border-radius: 8px; border: 1px solid #333;
      background: #0f0f1a; color: white; font-size: 15px; width: 100%;
    }
    .modal-send {
      padding: 12px; border-radius: 8px; background: #25D366;
      border: none; color: white; font-size: 15px; cursor: pointer; font-weight: 600;
    }
    .modal-cancel { background: none; border: none; color: #666; cursor: pointer; font-size: 13px; }
    .modal-msg { font-size: 13px; color: #4f8ef7; display: none; }
  </style>

  <style>
    .call-btn {
      position: fixed; bottom: 100px; right: 28px;
      width: 60px; height: 60px; border-radius: 50%;
      background: #4f8ef7; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(79,142,247,0.4);
      transition: transform 0.2s;
    }
    .call-btn:hover { transform: scale(1.1); }
    .call-btn svg { width: 28px; height: 28px; fill: white; }
    .call-modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
    }
    .call-modal-bg.open { display: flex; }
  </style>

  <button class="call-btn" onclick="document.getElementById('callBg').classList.add('open')" title="Umów wizytę głosowo">
    <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
  </button>

  <div class="call-modal-bg" id="callBg">
    <div class="modal">
      <h2>Umów wizytę głosowo 📞</h2>
      <p id="callStatus">Kliknij aby porozmawiać z agentem przez przeglądarkę.</p>
      <button class="modal-send" style="background:#4f8ef7" id="callActionBtn" onclick="toggleCall()">Rozpocznij rozmowę ➤</button>
      <button class="modal-cancel" onclick="stopCallAndClose()">Zamknij</button>
    </div>
  </div>

  <button class="wa-btn" onclick="document.getElementById('waBg').classList.add('open')" title="Sprawdź czas na WhatsApp">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </button>

  <div class="modal-bg" id="waBg">
    <div class="modal">
      <h2>Sprawdź czas na WhatsApp 🌍</h2>
      <p>Podaj numer WhatsApp — wyślemy wiadomość z aktualnym czasem.</p>
      <input id="waPhone" type="tel" placeholder="+48 123 456 789">
      <button class="modal-send" onclick="sendWA()">Wyślij wiadomość ➤</button>
      <div class="modal-msg" id="waMsg"></div>
      <button class="modal-cancel" onclick="document.getElementById('waBg').classList.remove('open')">Anuluj</button>
    </div>
  </div>

  <script type="module">
  import VapiLib from 'https://cdn.jsdelivr.net/npm/@vapi-ai/web/+esm';
  const Vapi = VapiLib.default || VapiLib;

  let vapiInstance = null;
  let inCall = false;

  window.toggleCall = async function() {
    if (inCall) { vapiInstance.stop(); return; }
    const btn = document.getElementById('callActionBtn');
    const status = document.getElementById('callStatus');
    btn.disabled = true;
    status.textContent = 'Łączę...';
    try {
      const { vapiPublicKey } = await (await fetch('/api/config')).json();
      vapiInstance = new Vapi(vapiPublicKey);
      vapiInstance.on('call-start', () => {
        inCall = true;
        btn.disabled = false;
        btn.textContent = 'Zakończ rozmowę ✕';
        btn.style.background = '#f74f4f';
        status.textContent = 'Połączono — mów do mikrofonu.';
      });
      vapiInstance.on('call-end', () => {
        inCall = false;
        btn.disabled = false;
        btn.textContent = 'Rozpocznij rozmowę ➤';
        btn.style.background = '#4f8ef7';
        status.textContent = 'Rozmowa zakończona.';
      });
      vapiInstance.on('error', (e) => {
        status.textContent = '❌ ' + (e.message || 'Błąd połączenia');
        btn.disabled = false;
      });
      vapiInstance.start('34bd5128-4664-440f-b974-81411b9f46f6');
    } catch(e) {
      status.textContent = '❌ ' + e.message;
      btn.disabled = false;
    }
  };

  window.stopCallAndClose = function() {
    if (vapiInstance && inCall) vapiInstance.stop();
    document.getElementById('callBg').classList.remove('open');
  };
  </script>

  <script>
  async function initiateCall() {
    const phone = document.getElementById('callPhone').value;
    const msg = document.getElementById('callMsg');
    msg.style.display = 'block';
    msg.textContent = 'Łączę...';
    try {
      const r = await fetch('/api/call', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone })
      });
      const d = await r.json();
      msg.textContent = d.ok ? '✅ Agent zadzwoni za chwilę!' : '❌ ' + d.error;
    } catch (e) {
      msg.textContent = '❌ ' + e.message;
    }
  }
  </script>

  <script>
  async function sendWA() {
    const phone = document.getElementById('waPhone').value;
    const msg = document.getElementById('waMsg');
    msg.style.display = 'block';
    msg.textContent = 'Wysyłam...';
    try {
      const r = await fetch('/api/whatsapp/initiate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone })
      });
      const d = await r.json();
      msg.textContent = d.ok ? '✅ Sprawdź WhatsApp!' : '❌ ' + d.error;
    } catch (e) {
      msg.textContent = '❌ ' + e.message;
    }
  }
  </script>

  </body>
