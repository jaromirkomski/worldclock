name: CI/CD

on:
  push:
    branches: [feature/ci-workflow]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t worldclock .
          docker tag worldclock:latest 990723917888.dkr.ecr.us-east-1.amazonaws.com/worldclock:latest
          docker push 990723917888.dkr.ecr.us-east-1.amazonaws.com/worldclock:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster worldclock \
            --service worldclock \
            --force-new-deployment
