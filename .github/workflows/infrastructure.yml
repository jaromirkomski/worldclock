name: Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_VAR_twilio_account_sid: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TF_VAR_twilio_auth_token: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_vapi_api_key: ${{ secrets.VAPI_API_KEY }}
      TF_VAR_vapi_phone_number_id: ${{ secrets.VAPI_PHONE_NUMBER_ID }}
      TF_VAR_vapi_public_key: ${{ secrets.VAPI_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Plan
        run: terraform plan
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform
